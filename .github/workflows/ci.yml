name: Python CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install black pylint
      - name: Check formatting with black
        run: black --check src/ tests/
        continue-on-error: true
      - name: Lint with pylint
        run: pylint src/main.py
        continue-on-error: true

  test:
    needs: lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with pytest
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install build tools
        run: pip install setuptools wheel
      - name: Build package
        run: python setup.py sdist bdist_wheel

  analysis:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install analysis tools
        run: pip install pylint pytest-cov
      - name: Run pylint analysis
        run: pylint src/main.py --exit-zero
      - name: Run pytest with coverage
        run: pytest tests/ --cov=src --cov-report=term

  performance:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt setuptools wheel
      - name: Measure build performance
        run: |
          /usr/bin/time -v python setup.py sdist bdist_wheel
